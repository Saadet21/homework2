 </tr>
 <tr>

   <label for="dob">Date of Birth: </label>
   <input type="date" 
id="dob"placeholder= "MM/DD/YYY" maxlength = "10" required>

</table>

<div>

<h3>Patient Information</h3>

<textarea id="skinconcern" name="skinconcern" rows="3" cols="50" maxlength= "200" placeholder="Enter symptoms here" required></textarea>

The user is asked to state their skin concerns in a text area.
-->

 <tr>

 </tr>
 <tr>

   <input type="range" id="skinrating" min="Calm" max="Very Sensitive" required>
   </td>
 </tr> 
<tr>
  <td>
   <label for="freq">How often do you experience flare-ups?</label>
   <input type="range" id="frequency" name="frequency" min="0" max="100" required>

   <span id="freqdisplay">0</span>
<!--
I used javascript to put in a slidebar that asks the user how often they get flare ups
-->

   <script>
  var slidebar = document.getElementById("frequency");
  var flareups = document.getElementById("freqdisplay");
  flareups.innerHTML = slidebar.value; 
  slidebar.oninput = function() {
  flareups.innerHTML = this.value;
}
   </script>

  </td>

 <tr>
    <td> 
     <input type="submit" value="Submit" id="submit">
     <input type="reset" value="Reset">
     <input type="button" onclick="validate()" value="Review Information">


<!--To make the "review" button i tried to use javascript by creating a new function called "validate" to display the inputted data to the user. I got very confused at this part and couldn't get it right, so I researched online how to code these types of pop-up windows
-->

<script>
function validate() {
 let clientid= document.getElementById("clientid").value;
 let fname= document.getElementById("fname").value;
 let mname= document.getElementById("mname").value;
 let lname= document.getElementById("lname").value;
 let dob= document.getElementById("dob").value;
 let ssn= document.getElementById("ssn").value;
 let email= document.getElementById("email").value;
 let phonenum= document.getElementById("phonenum").value;
 let addr1= document.getElementById("addr1").value;
 let addr2= document.getElementById("addr2").value;
 let city= document.getElementById("city").value;
 let state= document.getElementById("state").value;
 let zipcode= document.getElementById("zipcode").value;
 let skinconcern= document.getElementById("skinconcern").value;

<!-- so far until here i did it myself by looking at w3schools, but i used AI to help me understand how to syntax input types such as radio buttons and slide bars. 
I then used the window.confirm() method i learned from w3schools
-->

 let allergies= [];
if(document.getElementById("allergy1").checked)allergies.push("Latex");
if(document.getElementById("allergy2").checked)allergies.push("Penicillin");
if(document.getElementById("allergy3").checked)allergies.push("Fragrances");
if(document.getElementById("allergy4").checked)allergies.push("Adhesives/Bandages");
if(document.getElementById("allergy5").checked)allergies.push("Topical Antibiotics");
if(document.getElementById("allergy6").checked)allergies.push("None");
let pregnant=document.querySelector('input[name="pregnant"]:checked')?.value || "Not selected";
 let insurance =
document.querySelector('input[name="insurance"]:checked')?.value || "Not selected";

let smoking =
document.querySelector('input[name="smoking"]:checked')?.value || "Not selected";
 let skinrating= document.getElementById("skinrating").value;
 let frequency= document.getElementById("frequency").value;
 
  let popup =
"Please review your information:\n" +
"Client ID: " + clientid + "\n" +
"First Name: " + fname + "\n" +
"Middle Initial: " + mname + "\n" +
"Last Name: " + lname + "\n" +
"Date of Birth: " + dob + "\n" +
"SSN: " + ssn + "\n" +
"Email: " + email + "\n" +
"Phone: " + phonenum + "\n" +
"Address 1: " + addr1 + "\n" +
"Address 2: " + addr2 + "\n" +
"City: " + city + "\n" +
"State: " + state + "\n" +
"Zip Code: " + zipcode + "\n" +
"Skin Concern: " + skinconcern + "\n" +
"Allergies: " + allergies.join(", ") + "\n" +
"Pregnant: " + pregnant + "\n" +
"Insurance: " + insurance + "\n" +
"Smoking: " + smoking + "\n" +
"Skin Sensitivity: " + skinrating + "\n" +
"Flare-up Rating: " + frequency;

window.confirm(popup)
}

</script>

when the user clicks the submit button the code will ensure all required fields are full and in the required format.
